# Docker profile — overrides application.properties for Docker Compose environment
# Database connection is supplied via environment variables from docker-compose.yml

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/mini-market}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5174,http://localhost:5173}

app.jwt.secret=${JWT_SECRET:c2VjcmV0LWtleS1mb3Ita3VldC1taW5pLW1hcmtldC1hcHBsaWNhdGlvbi0yMDI2}
