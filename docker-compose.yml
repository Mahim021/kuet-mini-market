version: '3.8'

services:

  db:
    image: postgres:16-alpine
    container_name: mini-market-db
    environment:
      POSTGRES_DB: mini-market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mini-market"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mini-market-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mini-market
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  postgres_data:
